<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1600">
<title>BigBall — Telas do MVP</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="tokens.css">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Inter', system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const {
  ScreenLogin, ScreenHome, ScreenPool, ScreenPredictGroup,
  ScreenPredictKO, ScreenCalendar, ScreenCreatePool,
  ScreenJoinCode, ScreenMatchResult, ScreenAdmin,
} = window;

const PHONE_W = 360;
const PHONE_H = 760;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="intro" title="BigBall — MVP" subtitle="Telas principais do app de bolão da Copa 2026. Paleta principal: dark mode (#213448 · #547792 · #94B4C1 · #EAE0CF).">
        <DCArtboard id="login-dark" label="01 · Login (dark)" width={PHONE_W} height={PHONE_H}>
          <ScreenLogin theme="dark" />
        </DCArtboard>
        <DCArtboard id="login-light" label="01 · Login (light)" width={PHONE_W} height={PHONE_H}>
          <ScreenLogin theme="light" />
        </DCArtboard>
      </DCSection>

      <DCSection id="pools" title="Meus bolões & ranking" subtitle="Home autenticada, detalhe de bolão com ranking e cadeia de desempate visualizada.">
        <DCArtboard id="home-dark" label="02 · Home · Meus bolões" width={PHONE_W} height={PHONE_H}>
          <ScreenHome theme="dark" />
        </DCArtboard>
        <DCArtboard id="home-light" label="02 · Home (light)" width={PHONE_W} height={PHONE_H}>
          <ScreenHome theme="light" />
        </DCArtboard>
        <DCArtboard id="pool-dark" label="03 · Detalhe do bolão · Ranking" width={PHONE_W} height={PHONE_H}>
          <ScreenPool theme="dark" />
        </DCArtboard>
        <DCArtboard id="pool-light" label="03 · Detalhe (light)" width={PHONE_W} height={PHONE_H}>
          <ScreenPool theme="light" />
        </DCArtboard>
      </DCSection>

      <DCSection id="predict" title="Palpites" subtitle="Placar na fase de grupos e mata-mata (com palpite obrigatório de vencedor nos pênaltis). Lock T-5min visível.">
        <DCArtboard id="pred-group" label="04 · Palpite · Grupos" width={PHONE_W} height={PHONE_H}>
          <ScreenPredictGroup theme="dark" />
        </DCArtboard>
        <DCArtboard id="pred-ko" label="05 · Palpite · Mata-mata" width={PHONE_W} height={PHONE_H}>
          <ScreenPredictKO theme="dark" />
        </DCArtboard>
        <DCArtboard id="pred-ko-light" label="05 · Mata-mata (light)" width={PHONE_W} height={PHONE_H}>
          <ScreenPredictKO theme="light" />
        </DCArtboard>
      </DCSection>

      <DCSection id="calendar" title="Calendário & resultados" subtitle="Lista de jogos por dia, indicadores de estado (ao vivo, palpitado, aberto), breakdown de pontos após encerrar.">
        <DCArtboard id="cal-dark" label="06 · Calendário" width={PHONE_W} height={PHONE_H}>
          <ScreenCalendar theme="dark" />
        </DCArtboard>
        <DCArtboard id="result-dark" label="07 · Jogo encerrado · breakdown" width={PHONE_W} height={PHONE_H}>
          <ScreenMatchResult theme="dark" />
        </DCArtboard>
      </DCSection>

      <DCSection id="create-join" title="Criar & entrar" subtitle="Fluxos de criação de bolão (público/privado, premiação, custo informativo) e entrada com código.">
        <DCArtboard id="create-dark" label="08 · Criar bolão" width={PHONE_W} height={PHONE_H}>
          <ScreenCreatePool theme="dark" />
        </DCArtboard>
        <DCArtboard id="join-dark" label="09 · Entrar com código" width={PHONE_W} height={PHONE_H}>
          <ScreenJoinCode theme="dark" />
        </DCArtboard>
      </DCSection>

      <DCSection id="admin" title="Admin de plataforma (PRD 4.11)" subtitle="Área restrita para entrada manual de resultado quando o feed do provedor falha — com aviso de precedência.">
        <DCArtboard id="admin-dark" label="10 · Resultado manual" width={PHONE_W} height={PHONE_H}>
          <ScreenAdmin theme="dark" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
